name: CI - Develop

on:
  push:
    branches:
      - develop

env:
  DOTNET_VERSION: "10.0.x"
  SERVICE_DEFAULTS_PATH: "Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj"
  VERSION_FORMAT: "1.0.*-alpha*"
  NUGET_USERNAME: ${{ github.actor }}
  NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}

jobs:
  build:
    name: Build ServiceDefaults
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVICE_DEFAULTS_PATH }} -p:SharedLibraryVersion=${{ env.VERSION_FORMAT }}

      - name: Build
        run: dotnet build ${{ env.SERVICE_DEFAULTS_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=true /p:SharedLibraryVersion=${{ env.VERSION_FORMAT }}
