name: PR Validation

on:
  pull_request:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'Maliev.Aspire.ServiceDefaults/**'
      - 'Maliev.Aspire.AppHost/**'
      - 'Maliev.Aspire.Tests/**'
      - '.github/workflows/**'
      - '*.slnx'

env:
  DOTNET_VERSION: '10.0.x'
  SERVICE_DEFAULTS_PATH: 'Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj'
  NUGET_USERNAME: ${{ github.actor }}
  NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version_format: ${{ steps.set-version.outputs.version_format }}
    steps:
      - id: set-version
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          if [[ "$BASE_BRANCH" == "main" ]]; then
            VERSION_FORMAT="1.0.*"
          elif [[ "$BASE_BRANCH" == "staging" ]]; then
            VERSION_FORMAT="1.0.*-beta*"
          else
            VERSION_FORMAT="1.0.*-alpha*"
          fi
          echo "version_format=$VERSION_FORMAT" >> $GITHUB_OUTPUT

  build-and-test:
    needs: prep
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVICE_DEFAULTS_PATH }} -p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

      - name: Build ServiceDefaults
        run: dotnet build ${{ env.SERVICE_DEFAULTS_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=true /p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

  system-integration-tests:
    name: System Integration Tests
    needs: [prep, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Create test secrets
        run: |
          cat > sharedsecrets.json << 'SECRETS_EOF'
          {
            "Jwt": {
              "SecurityKey": "test-secret-key-at-least-32-characters-long-for-ci",
              "PrivateKey": "",
              "PublicKey": "",
              "Issuer": "test-issuer",
              "Audience": "test-audience"
            },
            "RabbitMQ": {
              "Username": "guest",
              "Password": "guest",
              "ErlangCookie": "test-cookie"
            },
            "Authentication": {
              "Google": {
                "ClientId": "test-google-id",
                "ClientSecret": "test-google-secret"
              }
            },
            "CORS": {
              "AllowedOrigins": ["http://localhost"]
            },
            "GCP": {
              "ProjectId": "test-project",
              "ServiceAccountKeyBase64": ""
            }
          }
          SECRETS_EOF

      - name: Run System Integration Tests
        run: |
          dotnet test Maliev.Aspire.Tests/Maliev.Aspire.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage"
        timeout-minutes: 15

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/

      - name: Generate Coverage Report
        if: success()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:./CoverageReport \
            -reporttypes:Html || true

      - name: Upload Coverage Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport/

  publish-validation:
    name: Validate NuGet Package
    runs-on: ubuntu-latest
    needs: [prep, build-and-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVICE_DEFAULTS_PATH }} -p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

      - name: Build for Release
        run: dotnet build ${{ env.SERVICE_DEFAULTS_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=true /p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

      - name: Pack (Dry Run)
        run: |
          dotnet pack ${{ env.SERVICE_DEFAULTS_PATH }} \
            --configuration Release \
            --no-build \
            -p:PackageVersion=0.0.0-validation \
            --output ./nupkg

      - name: Verify Package Created
        run: |
          if [ ! -f ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg ]; then
            echo "ERROR: NuGet package was not created!"
            exit 1
          fi
          echo "NuGet package created successfully"
          ls -la ./nupkg/

      - name: List Package Contents
        run: |
          unzip -l ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg

      - name: Validate Package (Optional)
        run: |
          dotnet tool install --global dotnet-validate --version 0.0.1-preview.304 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet-validate package local ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg || echo "Validation tool failed but package exists"
