name: PR Validation

on:
  pull_request:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'Maliev.Aspire.ServiceDefaults/**'
      - 'Maliev.Aspire.ServiceDefaults.Tests/**'
      - 'Maliev.Aspire.AppHost/**'
      - 'Maliev.Aspire.DatabaseSeeder/Seeding/Services/Shared/LocalServiceIdentitySeedOptions.cs'
      - 'Maliev.Aspire.DatabaseSeeder/Seeding/Services/AuthService/AuthServiceIdentityDatabaseSeeder.cs'
      - 'Maliev.Aspire.DatabaseSeeder/Seeding/Services/IAMService/IAMDatabaseSeeder.cs'
      - 'Maliev.Aspire.LocalIdentity.Tests/**'
      - 'Maliev.Aspire.Tests/**'
      - '.github/scripts/resolve-servicedefaults-version.sh'
      - '.github/workflows/**'
      - '*.slnx'

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  SERVICE_DEFAULTS_PATH: 'Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj'
  SERVICE_DEFAULTS_TESTS_PATH: 'Maliev.Aspire.ServiceDefaults.Tests/Maliev.Aspire.ServiceDefaults.Tests.csproj'
  LOCAL_IDENTITY_TESTS_PATH: 'Maliev.Aspire.LocalIdentity.Tests/Maliev.Aspire.LocalIdentity.Tests.csproj'

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version_format: ${{ steps.set-version.outputs.version_format }}
    steps:
      - id: set-version
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          if [[ "$BASE_BRANCH" == "main" ]]; then
            VERSION_FORMAT="1.0.*"
          elif [[ "$BASE_BRANCH" == "staging" ]]; then
            VERSION_FORMAT="1.0.*-beta*"
          else
            VERSION_FORMAT="1.0.*-alpha*"
          fi
          echo "version_format=$VERSION_FORMAT" >> $GITHUB_OUTPUT

  build-and-test:
    needs: prep
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      NUGET_USERNAME: ${{ github.actor }}
      NUGET_PASSWORD: ${{ secrets.GITOPS_PAT || github.token }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVICE_DEFAULTS_PATH }} -p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

      - name: Build ServiceDefaults
        run: dotnet build ${{ env.SERVICE_DEFAULTS_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=true /p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

  local-identity-contract:
    name: Local Identity Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-local-identity-${{ hashFiles('Maliev.Aspire.LocalIdentity.Tests/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-local-identity-

      - name: Restore local identity contract tests
        run: dotnet restore ${{ env.LOCAL_IDENTITY_TESTS_PATH }} --locked-mode

      - name: Run local identity contract tests
        run: |
          dotnet test ${{ env.LOCAL_IDENTITY_TESTS_PATH }} \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=local-identity-results.trx" \
            --results-directory ./TestResults/LocalIdentity

      - name: Upload local identity test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: local-identity-test-results-${{ github.run_attempt }}
          path: ./TestResults/LocalIdentity/
          if-no-files-found: error
          retention-days: 7

  # Full Maliev.Aspire.Tests execution requires the sibling service fleet and remains a local-only system gate.
  service-defaults-tests:
    name: ServiceDefaults Unit Tests
    needs: [prep, build-and-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NUGET_USERNAME: ${{ github.actor }}
      NUGET_PASSWORD: ${{ secrets.GITOPS_PAT || github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run ServiceDefaults Unit Tests
        run: |
          dotnet test ${{ env.SERVICE_DEFAULTS_TESTS_PATH }} \
            --configuration Release \
            -p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }} \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage"
        timeout-minutes: 15

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: ./TestResults/

      - name: Generate Coverage Report
        if: success()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:./CoverageReport \
            -reporttypes:Html || true

      - name: Upload Coverage Report
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: ./CoverageReport/

  publish-validation:
    name: Validate NuGet Package
    runs-on: ubuntu-latest
    needs: [prep, build-and-test]
    env:
      NUGET_USERNAME: ${{ github.actor }}
      NUGET_PASSWORD: ${{ secrets.GITOPS_PAT || github.token }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVICE_DEFAULTS_PATH }} -p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

      - name: Build for Release
        run: dotnet build ${{ env.SERVICE_DEFAULTS_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=true /p:SharedLibraryVersion=${{ needs.prep.outputs.version_format }}

      - name: Pack (Dry Run)
        run: |
          dotnet pack ${{ env.SERVICE_DEFAULTS_PATH }} \
            --configuration Release \
            --no-build \
            -p:PackageVersion=0.0.0-validation \
            --output ./nupkg

      - name: Verify Package Created
        run: |
          if [ ! -f ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg ]; then
            echo "ERROR: NuGet package was not created!"
            exit 1
          fi
          echo "NuGet package created successfully"
          ls -la ./nupkg/

      - name: List Package Contents
        run: |
          unzip -l ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg

      - name: Validate Package (Optional)
        run: |
          dotnet tool install --global dotnet-validate --version 0.0.1-preview.304 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet-validate package local ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg || echo "Validation tool failed but package exists"
