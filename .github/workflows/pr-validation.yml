name: PR Validation

on:
  pull_request:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'Maliev.Aspire.ServiceDefaults/**'
      - 'Maliev.Aspire.AppHost/**'
      - 'Maliev.Aspire.Tests/**'
      - '.github/workflows/**'
      - '*.slnx'

env:
  DOTNET_VERSION: '10.0.x'
  SERVICE_DEFAULTS_PATH: 'Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj'
  NUGET_USERNAME: ${{ github.actor }}
  NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Replace ProjectReference with PackageReference
        run: |
          # This matches the platform convention to allow CI to build without sibling repos
          sed -i 's|<ProjectReference Include="..\\..\\Maliev.MessagingContracts\\generated\\csharp\\Maliev.MessagingContracts.csproj" />|<PackageReference Include="Maliev.MessagingContracts" Version="1.0.*-*" />|g' ${{ env.SERVICE_DEFAULTS_PATH }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVICE_DEFAULTS_PATH }}

      - name: Build ServiceDefaults
        run: dotnet build ${{ env.SERVICE_DEFAULTS_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=true

  publish-validation:
    name: Validate NuGet Package
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Replace ProjectReference with PackageReference
        run: |
          sed -i 's|<ProjectReference Include="..\\..\\Maliev.MessagingContracts\\generated\\csharp\\Maliev.MessagingContracts.csproj" />|<PackageReference Include="Maliev.MessagingContracts" Version="1.0.*-*" />|g' ${{ env.SERVICE_DEFAULTS_PATH }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVICE_DEFAULTS_PATH }}

      - name: Build for Release
        run: dotnet build ${{ env.SERVICE_DEFAULTS_PATH }} --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Pack (Dry Run)
        run: |
          dotnet pack ${{ env.SERVICE_DEFAULTS_PATH }} \
            --configuration Release \
            --no-build \
            -p:PackageVersion=0.0.0-validation \
            --output ./nupkg

      - name: Verify Package Created
        run: |
          if [ ! -f ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg ]; then
            echo "ERROR: NuGet package was not created!"
            exit 1
          fi
          echo "NuGet package created successfully"
          ls -la ./nupkg/

      - name: List Package Contents
        run: |
          unzip -l ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg

      - name: Validate Package (Optional)
        run: |
          dotnet tool install --global dotnet-validate --version 0.0.1-preview.304 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet-validate package local ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg || echo "Validation tool failed but package exists"
