name: PR Validation

on:
  pull_request:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'Maliev.Aspire.ServiceDefaults/**'
      - 'Maliev.Aspire.AppHost/**'
      - 'Maliev.Aspire.Tests/**'
      - '*.sln'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Maliev.Aspire.sln

      - name: Build
        run: dotnet build Maliev.Aspire.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test Maliev.Aspire.sln --configuration Release --no-build --verbosity normal

  publish-validation:
    name: Validate NuGet Package
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj

      - name: Build for Release
        run: dotnet build Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Pack (Dry Run)
        run: |
          dotnet pack Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion=0.0.0-validation \
            --output ./nupkg

      - name: Verify Package Created
        run: |
          if [ ! -f ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg ]; then
            echo "ERROR: NuGet package was not created!"
            exit 1
          fi
          echo "NuGet package created successfully"
          ls -la ./nupkg/

      - name: List Package Contents
        run: |
          # Use dotnet nuget verify or just list files
          unzip -l ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg

      - name: Validate Package (Optional)
        run: |
          dotnet tool install --global dotnet-validate --version 0.0.1-preview.304 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet-validate package local ./nupkg/Maliev.Aspire.ServiceDefaults.0.0.0-validation.nupkg || echo "Validation tool failed but package exists"
