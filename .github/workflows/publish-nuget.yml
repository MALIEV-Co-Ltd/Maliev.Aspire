name: Publish NuGet Package

on:
  push:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'Maliev.Aspire.ServiceDefaults/**'
      - 'Directory.Build.props'
      - 'README.md'
      - 'nuget.config'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Stable package version (X.Y.Z or vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-servicedefaults-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj'
  TESTS_PATH: 'Maliev.Aspire.ServiceDefaults.Tests/Maliev.Aspire.ServiceDefaults.Tests.csproj'

jobs:
  publish:
    name: Validate and publish immutable package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-servicedefaults-${{ hashFiles('Maliev.Aspire.ServiceDefaults/**/*.csproj', 'Maliev.Aspire.ServiceDefaults.Tests/**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-servicedefaults-

      - name: Resolve and validate package version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MANUAL_VERSION: ${{ github.event.inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          VERSION="$(bash .github/scripts/resolve-servicedefaults-version.sh \
            "$EVENT_NAME" \
            "$REF_NAME" \
            "$RELEASE_TAG" \
            "$MANUAL_VERSION" \
            "$RUN_NUMBER" \
            "$RUN_ATTEMPT" \
            "$COMMIT_SHA")"

          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "develop" ]]; then
            SHARED_LIBRARY_VERSION="1.0.*-alpha*"
          elif [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "staging" ]]; then
            SHARED_LIBRARY_VERSION="1.0.*-beta*"
          else
            SHARED_LIBRARY_VERSION="1.0.*"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "shared_library_version=$SHARED_LIBRARY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable package version: $VERSION"

      - name: Restore package-mode dependencies
        env:
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}
        run: |
          dotnet restore ${{ env.TESTS_PATH }} \
            -p:UsePackageReferences=true \
            -p:SharedLibraryVersion="${{ steps.version.outputs.shared_library_version }}"

      - name: Build ServiceDefaults in package mode
        run: |
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            -p:UsePackageReferences=true \
            -p:SharedLibraryVersion="${{ steps.version.outputs.shared_library_version }}" \
            -p:ContinuousIntegrationBuild=true

      - name: Run ServiceDefaults tests
        run: |
          dotnet test ${{ env.TESTS_PATH }} \
            --configuration Release \
            --no-restore \
            -p:UsePackageReferences=true \
            -p:SharedLibraryVersion="${{ steps.version.outputs.shared_library_version }}"

      - name: Pack immutable package
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            -p:UsePackageReferences=true \
            -p:SharedLibraryVersion="${{ steps.version.outputs.shared_library_version }}" \
            -p:PackageVersion="${{ steps.version.outputs.version }}" \
            -p:RepositoryCommit="${{ github.sha }}" \
            -p:ContinuousIntegrationBuild=true \
            --output ./nupkg

      - name: Push package to GitHub Packages
        run: |
          dotnet nuget push "./nupkg/Maliev.Aspire.ServiceDefaults.${{ steps.version.outputs.version }}.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}"

      - name: Upload immutable package evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: servicedefaults-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: ./nupkg/Maliev.Aspire.ServiceDefaults.${{ steps.version.outputs.version }}.nupkg
          if-no-files-found: error
          retention-days: 14

      - name: Record publication metadata
        run: |
          {
            echo "### ServiceDefaults package publication"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Event: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
