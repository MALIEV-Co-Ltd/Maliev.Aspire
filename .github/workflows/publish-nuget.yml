name: Publish NuGet Package

on:
  push:
    branches:
      - main      # Stable releases (1.0.X)
      - staging   # Beta releases (1.0.X-beta)
      - develop   # Alpha releases (1.0.X-alpha)
    paths:
      - 'Maliev.Aspire.ServiceDefaults/**'
      - '.github/workflows/**'
      - 'nuget.config'
      - 'Maliev.Aspire.slnx'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 1.0.0)'
        required: false
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'Maliev.Aspire.ServiceDefaults/Maliev.Aspire.ServiceDefaults.csproj'
  NUGET_USERNAME: ${{ github.actor }}
  NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Replace ProjectReference with PackageReference
        run: |
          # This matches the platform convention to allow CI to build without sibling repos
          # For release builds, we use the semantic version pattern based on the branch
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" == "main" ]; then
            VERSION_PATTERN="1.0.*"
          else
            VERSION_PATTERN="1.0.*-*"
          fi
          sed -i "s|<ProjectReference Include=\"..\\\\..\\\\Maliev.MessagingContracts\\\\generated\\\\csharp\\\\Maliev.MessagingContracts.csproj\" />|<PackageReference Include=\"Maliev.MessagingContracts\" Version=\"$VERSION_PATTERN\" />|g" ${{ env.PROJECT_PATH }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            # Version based on branch and run number
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" == "main" ]; then
              # Stable release
              VERSION="1.0.${{ github.run_number }}"
            elif [ "$BRANCH" == "staging" ]; then
              # Beta pre-release
              VERSION="1.0.${{ github.run_number }}-beta"
            elif [ "$BRANCH" == "develop" ]; then
              # Alpha pre-release
              VERSION="1.0.${{ github.run_number }}-alpha"
            else
              # Fallback
              VERSION="1.0.${{ github.run_number }}"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Pack
        run: >
          dotnet pack ${{ env.PROJECT_PATH }}
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.version.outputs.version }}
          --output ./nupkg

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key ${{ secrets.GITOPS_PAT }}
          --skip-duplicate

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg
